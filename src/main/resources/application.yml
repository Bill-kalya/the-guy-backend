spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db

  data:
    redis:
      host: ${REDISHOST}
      port: ${REDISPORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

otp:
  hash-secret: ${OTP_HASH_SECRET}

logging:
  level:
    com.theguy.app: ${LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

resend:
  api-key: ${RESEND_API_KEY:re_5zS1LrNo_Aq82Db8K3B2Xizqzu3GobG46}
  from-email: ${MAIL_FROM:support@mail.theguy.co.ke}
  from-name: ${MAIL_FROM_NAME:TheGuy}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

server:
  error:
    include-message: always
    include-binding-errors: always
  tomcat:
    max-threads: 100
    min-spare-threads: 5
    accept-count: 50

# External URLs
api:
  url: ${API_URL:https://api.theguy.co.ke}
ws:
  url: ${WS_URL:wss://api.theguy.co.ke}

# File uploads
file:
  upload-dir: ${UPLOAD_DIR:uploads}

# Allowed websocket origins (used by Spring STOMP endpoint)
websocket:
  allowed-origins:
    - ${WEBSOCKET_ALLOWED_ORIGIN_1:https://app.theguy.co.ke}
    - ${WEBSOCKET_ALLOWED_ORIGIN_2:http://localhost:3000}
  sockjs:
    client-library-url: ${WEBSOCKET_SOCKJS_CLIENT_URL:https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js}

# M-Pesa (Safaricom Daraja)
mpesa:
  consumer-key: ${MPESA_CONSUMER_KEY:}
  consumer-secret: ${MPESA_CONSUMER_SECRET:}
  short-code: ${MPESA_SHORT_CODE:}
  pass-key: ${MPESA_PASS_KEY:}
  callback-url: ${MPESA_CALLBACK_URL:https://api.theguy.co.ke/api/payments/webhooks/mpesa}
  environment: ${MPESA_ENVIRONMENT:sandbox}

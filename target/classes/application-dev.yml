spring:
  datasource:
    url: jdbc:h2:mem:theguy;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  flyway:
    enabled: false  # Disable for quick dev start
  
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: "dev-secret-key-for-testing-only-32chars!!"
  expiration: 86400000

otp:
  hash-secret: "dev-otp-secret-only-not-for-production"

server:
  port: 8080

logging:
  level:
    com.theguy.app: DEBUG
    org.springframework.web: INFO
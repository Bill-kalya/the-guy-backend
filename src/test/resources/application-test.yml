spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false

jwt:
  secret: "test-secret-key-that-is-long-enough-for-hs256-algo"
  expiration: 86400000
  refresh-expiration: 604800000

otp:
  hash-secret: "test-otp-secret-only-not-for-production"

management:
  health:
    redis:
      enabled: false


version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: the-guy-postgres
    environment:
      POSTGRES_DB: the_guy
      POSTGRES_USER: theguy
      POSTGRES_PASSWORD: theguy123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: the-guy-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
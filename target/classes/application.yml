spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db

  data:
    redis:
      host: ${REDISHOST}
      port: ${REDISPORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

logging:
  level:
    com.theguy.app: ${LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

server:
  tomcat:
    max-threads: 200
    min-spare-threads: 10
    accept-count: 100

# External URLs
api:
  url: ${API_URL:https://the-guy-backend-production.up.railway.app}
ws:
  url: ${WS_URL:wss://the-guy-backend-production.up.railway.app}

# Allowed websocket origins (used by Spring STOMP endpoint)
websocket:
  allowed-origins:
    - ${WEBSOCKET_ALLOWED_ORIGIN_1:https://app.theguy.co.ke}
    - ${WEBSOCKET_ALLOWED_ORIGIN_2:http://localhost:3000}
  sockjs:
    client-library-url: ${WEBSOCKET_SOCKJS_CLIENT_URL:https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js}
